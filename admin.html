<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Inscriptions</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px auto;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #exportPDF {
            display: block;
            margin: 20px auto;
            background: #004080;
            color: white;
        }

        .delete {
            background: red;
            color: white;
            margin-top: 10px;
        }

        #search {
            display:block;
            margin:20px auto;
            padding:10px;
            width:300px;
        }
    </style>
</head>

<body>

<h1>📋 Liste des inscriptions</h1>

<input id="search" placeholder="Rechercher...">

<div id="liste"></div>

<button id="exportPDF">📄 Export PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">

// 🔐 MOT DE PASSE
const password = prompt("Mot de passe admin :");

if (password !== "ASCT2025") {
    document.body.innerHTML = "<h1>Accès refusé ❌</h1>";
    throw new Error("Accès refusé");
}

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "asct-ski.firebaseapp.com",
  projectId: "asct-ski",
  storageBucket: "asct-ski.firebasestorage.app",
  messagingSenderId: "845391150142",
  appId: "1:845391150142:web:c7d808016344cfafad256f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// HTML
const liste = document.getElementById("liste");
const searchInput = document.getElementById("search");
const exportBtn = document.getElementById("exportPDF");

// stockage global
let allData = [];

// 🔧 fonction affichage
function afficherListe(dataArray) {

    liste.innerHTML = "";

    dataArray.forEach(person => {

        const div = document.createElement("div");
        div.classList.add("card");

        div.innerHTML = `
            <strong>${person.prenom} ${person.nom}</strong><br>
            📧 ${person.email || "—"}<br>
            📱 ${person.telephone || "—"}<br>
            🎂 ${person.dateNaissance || "—"}<br>

            <button class="delete">🗑️ Supprimer</button>
        `;

        div.querySelector(".delete").addEventListener("click", async () => {
            if (confirm("Supprimer cette inscription ?")) {
                await deleteDoc(doc(db, "inscriptions", person.id));
            }
        });

        liste.appendChild(div);
    });
}

// 🔄 FIRESTORE LIVE
onSnapshot(collection(db, "inscriptions"), (snapshot) => {

    allData = [];

    snapshot.forEach(docSnap => {
        allData.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    afficherListe(allData);
});

// 🔍 RECHERCHE
searchInput.addEventListener("input", () => {

    const value = searchInput.value.toLowerCase();

    const filtered = allData.filter(person =>
        (person.nom || "").toLowerCase().includes(value) ||
        (person.prenom || "").toLowerCase().includes(value) ||
        (person.email || "").toLowerCase().includes(value) ||
        (person.telephone || "").toLowerCase().includes(value)
    );

    afficherListe(filtered);
});

// 📄 EXPORT PDF
exportBtn.addEventListener("click", () => {

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    allData.forEach((person, index) => {

        if (index > 0) pdf.addPage();

        // TITRE
        pdf.setFontSize(18);
        pdf.text("ASCT SKI Competition - Fiche d'inscription", 20, 20);

        pdf.setLineWidth(0.5);
        pdf.line(20, 25, 190, 25);

        pdf.setFontSize(12);

        // INFOS
        pdf.text(`Nom : ${person.nom || "-"}`, 20, 40);
        pdf.text(`Prénom : ${person.prenom || "-"}`, 20, 50);
        pdf.text(`Email : ${person.email || "-"}`, 20, 60);
        pdf.text(`Téléphone : ${person.telephone || "-"}`, 20, 70);
        pdf.text(`Naissance : ${person.dateNaissance || "-"}`, 20, 80);

        // pied de page
        pdf.setFontSize(10);
        pdf.text("ASCT Ski Competition", 20, 280);
    });

    pdf.save("inscriptions_ASCT.pdf");
});

</script>

</body>
</html>
